<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LCARS Radar</title>

<style>
:root {
  --orange: #ff9c4a;
  --amber: #ffcc66;
  --bg: #0b0b10;
}

html, body {
  margin: 0;
  height: 100%;
  background: var(--bg);
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.frame {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  bottom: 10px;
  border: 8px solid var(--orange);
  border-radius: 18px;
  overflow: hidden;
}

.topbar {
  position: absolute;
  top: 10px;
  left: 20px;
  z-index: 10;
  color: var(--amber);
  font-size: 12px;
  background: rgba(0,0,0,0.5);
  padding: 4px 8px;
  border-radius: 6px;
}

iframe {
  width: 100%;
  height: 100%;
  border: 0;
}
</style>
</head>

<body>

<div class="frame">
  <div class="topbar">LCARS RADAR • KAKQ • LIVE</div>

  <iframe src="https://radar.weather.gov/station/KAKQ/standard"></iframe>
</div>

</body>
</html>
